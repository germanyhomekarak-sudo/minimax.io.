<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 70" role="img" aria-label="al BOURJI ELECTRICS">
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#E5C158"/><stop offset=".5" stop-color="#D4AF37"/><stop offset="1" stop-color="#9C7C1E"/>
    </linearGradient>
    <linearGradient id="darkG" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1a1a1a"/><stop offset="1" stop-color="#000"/>
    </linearGradient>
  </defs>
  <g>
    <!-- شعار البرج -->
    <rect x="3" y="8" width="54" height="54" rx="12" fill="url(#darkG)"/>
    <path d="M14 22 L30 12 L46 22 L46 52 L14 52 Z" fill="url(#gold)"/>
    <!-- نوافذ البرج -->
    <rect x="22" y="28" width="6" height="8" fill="url(#darkG)"/>
    <rect x="32" y="28" width="6" height="8" fill="url(#darkG)"/>
    <rect x="22" y="40" width="6" height="8" fill="url(#darkG)"/>
    <rect x="32" y="40" width="6" height="8" fill="url(#darkG)"/>
    <!-- البرق -->
    <path d="M30 8 L27 14 L31 14 L28 22" stroke="url(#gold)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  </g>
  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="68" y="34" font-size="24" font-weight="700" fill="#0E0E0E" letter-spacing="1">
      <tspan font-style="italic" font-size="14" fill="#D4AF37" baseline-shift="super">al</tspan>
      <tspan dx="2">BOURJI</tspan>
    </text>
    <text x="68" y="56" font-size="11" font-weight="400" fill="#D4AF37" letter-spacing="6">ELECTRICS</text>
    <!-- زخرفة خط -->
    <line x1="68" y1="60" x2="240" y2="60" stroke="#D4AF37" stroke-width=".5" opacity=".5"/>
  </g>
</svg>
